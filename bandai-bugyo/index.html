    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#23406b" />
    <link rel="icon" href="data:," />
    <title>番台奉行（仮）</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: #16202c;
        overflow: hidden;
        overscroll-behavior: none;
        touch-action: none;
        -webkit-user-select: none;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      /* 実機で 100vh がツールバー/ノッチ領域を含み、上下や端が隠れる問題を回避。
         safe-area でノッチ・ホームインジケータを避け（ない端末は 0 で全画面のまま）、
         中央寄せは Phaser の ScaleManager(CENTER_BOTH) に任せる。 */
      #game {
        position: fixed;
        top: env(safe-area-inset-top, 0px);
        left: env(safe-area-inset-left, 0px);
        right: env(safe-area-inset-right, 0px);
        bottom: env(safe-area-inset-bottom, 0px);
        overflow: hidden;
      }
      #game canvas {
        touch-action: none;
        display: block;
      }
      /* Noto Sans JP を端末フォントにフォールバック（オフライン完結） */
      * {
        font-family: "Noto Sans JP", "Hiragino Sans", "Yu Gothic", sans-serif;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-RuzTW5fe.js"></script>
  </head>
  <body>
    <div id="game"></div>
  </body>
</html>

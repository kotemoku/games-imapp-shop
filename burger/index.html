<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#74C4D6" />
    <title>バーガー・スタック・ラッシュ</title>
    <script>
      // 旧Flutter版のService Worker / キャッシュが残っていると旧版が表示されるため掃除する。
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker
          .getRegistrations()
          .then((rs) => rs.forEach((r) => r.unregister()))
          .catch(() => {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then((ks) => ks.forEach((k) => caches.delete(k))).catch(() => {});
      }
    </script>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: #241c2c;
        overflow: hidden;
        touch-action: none;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior: none;
      }
      #game {
        width: 100%;
        height: 100%;
        /* セーフエリア（ノッチ・ジェスチャーバー）対応。これが無いと
           キャンバスが下部UIの裏まで広がり、最下段のトレイが見切れる。 */
        padding: env(safe-area-inset-top) env(safe-area-inset-right)
          env(safe-area-inset-bottom) env(safe-area-inset-left);
        box-sizing: border-box;
      }
    </style>
    <script type="module" crossorigin src="./assets/index-urZUJ0F4.js"></script>
  </head>
  <body>
    <div id="game"></div>
  </body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <!-- 背景: テーマカラー (赤) -->
  <rect width="512" height="512" fill="#E84B3C"/>

  <!-- 上バン (ドーム形を段差で表現) -->
  <rect x="112" y="120" width="288" height="24" fill="#E89A3F"/>
  <rect x="96"  y="144" width="320" height="24" fill="#E89A3F"/>
  <rect x="88"  y="168" width="336" height="56" fill="#E89A3F"/>

  <!-- 上バンのハイライト (左肩) -->
  <rect x="120" y="144" width="56"  height="16" fill="#F3BC6B"/>
  <rect x="112" y="168" width="72"  height="16" fill="#F3BC6B"/>

  <!-- ごま 3 つ -->
  <rect x="168" y="160" width="20" height="12" fill="#FFE7A5"/>
  <rect x="244" y="160" width="20" height="12" fill="#FFE7A5"/>
  <rect x="320" y="160" width="20" height="12" fill="#FFE7A5"/>

  <!-- レタス (はみ出るギザギザ) -->
  <rect x="80"  y="224" width="352" height="16" fill="#3DA94C"/>
  <rect x="72"  y="240" width="368" height="20" fill="#55C65A"/>
  <rect x="88"  y="232" width="16"  height="8"  fill="#3DA94C"/>
  <rect x="160" y="232" width="16"  height="8"  fill="#3DA94C"/>
  <rect x="232" y="232" width="16"  height="8"  fill="#3DA94C"/>
  <rect x="312" y="232" width="16"  height="8"  fill="#3DA94C"/>
  <rect x="392" y="232" width="16"  height="8"  fill="#3DA94C"/>

  <!-- チーズ (溶けて垂れる縁) -->
  <rect x="88"  y="260" width="336" height="20" fill="#FFD23F"/>
  <rect x="96"  y="280" width="16"  height="12" fill="#FFD23F"/>
  <rect x="200" y="280" width="20"  height="12" fill="#FFD23F"/>
  <rect x="304" y="280" width="20"  height="12" fill="#FFD23F"/>
  <rect x="400" y="280" width="16"  height="12" fill="#FFD23F"/>

  <!-- パテ (焼き目つき) -->
  <rect x="96"  y="292" width="320" height="44" fill="#7A3E2D"/>
  <rect x="96"  y="292" width="320" height="8"  fill="#5C2C1F"/>
  <!-- パテのグリル目 -->
  <rect x="128" y="308" width="32"  height="6"  fill="#5C2C1F"/>
  <rect x="224" y="308" width="32"  height="6"  fill="#5C2C1F"/>
  <rect x="320" y="308" width="32"  height="6"  fill="#5C2C1F"/>

  <!-- 下バン (反対側のドーム) -->
  <rect x="88"  y="336" width="336" height="40" fill="#E89A3F"/>
  <rect x="96"  y="376" width="320" height="16" fill="#D17F2A"/>
  <rect x="112" y="392" width="288" height="8"  fill="#B86A20"/>

  <!-- 下バンのハイライト -->
  <rect x="112" y="344" width="80"  height="12" fill="#F3BC6B"/>
</svg>

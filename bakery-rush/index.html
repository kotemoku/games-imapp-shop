"use strict";
/* =========================================================================
   やきたて！ベーカリーラッシュ  —  teraia / single-file edition
   マッチ→ショーケース演出→棚→客さばき。看板商品・釜出し・図鑑・不満ゲージ。
   ========================================================================= */

//==================== 基本セットアップ ====================
const W = 540, H = 960;                 // 内部解像度（9:16）
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let DPR = Math.min(window.devicePixelRatio || 1, 2.5);
function resize(){
  const wrap = document.getElementById('wrap');
  const r = wrap.getBoundingClientRect();
  canvas.width = Math.round(r.width * DPR);
  canvas.height = Math.round(r.height * DPR);
  fit = canvas.width / W;
  // 縦に合わせて中央寄せ用オフセット
  fit = Math.min(canvas.width / W, canvas.height / H);
  offX = (canvas.width  - W*fit)/2;
  offY = (canvas.height - H*fit)/2;
}
let fit=1, offX=0, offY=0;
window.addEventListener('resize', resize);


//==================== 領域レイアウト ====================
// 上部バンド: 0-58 スコアバー / 58-130 クリーム帯（オーダー）。ショーケース窓は廃止。
const HUDH = 58;
const ORDERS   = { y:78,  h:40 };                      // オーダー票の行（上部集約）
const FIELD = { x:24, y:132, w:W-48, bottom:752 };     // 落下・山積み（窓削除分 上へ拡張）
const SHELF = { y:760, h:168 };                        // 店先の棚（760-928）
const BASELINE_Y = 210;                                // ゲームオーバー基準線
const BR = 33;                                         // パン半径（統一円）

//==================== imapp 連携（iframe親へ postMessage / packer-panic と同契約） ====================
const IMAPP = (()=>{
  const SOURCE='bakery-rush', HOST_SOURCE='imappt';          // 自分/親(imapp) の識別子
  const params = new URLSearchParams((typeof location!=='undefined' && location.search) || '');
  const hostOrigin = params.get('hostOrigin') || '*';
  const st = { player: params.get('player')||null,
               embedded: (typeof window!=='undefined' && window.parent && window.parent!==window) };
  function send(type, payload){
    if(!st.embedded) return;
    try{ window.parent.postMessage({ source:SOURCE, type, payload:payload||{} }, hostOrigin); }catch(e){}
  }
  if(typeof window!=='undefined' && window.addEventListener){
    window.addEventListener('message', (e)=>{                 // 親(imapp)からの受信
      const d=e&&e.data; if(!d || d.source!==HOST_SOURCE || typeof d.type!=='string') return;
      const p=d.payload||{};
      if(p.player!=null) st.player=p.player;
      if(d.type==='config'||d.type==='host_init'||d.type==='init'){ send('config_ack', { player: st.player }); }
    });
  }
  return {
    ready(){ send('ready', { player: st.player }); },
    gameStart(){ send('game_start', { player: st.player }); },
    gameOver(score, extra){ send('game_over', Object.assign({ score, player: st.player }, extra||{})); },
    get player(){ return st.player; }, get embedded(){ return st.embedded; },
  };
})();

//==================== メニュー（config/menu 相当） ====================
// 10種のプール。毎ゲーム、この中から5種をランダムに選んで出す。
// 物理は全種ほぼ同径の丸。見た目は丸く切り抜いた写真アイコン（assets/breadN.png）。
const POOL = [
  { id:'b0', name:'トマトフォカッチャ', price:280, cap:'完熟トマトの旨み',   color:'#ce6d22', img:0 },
  { id:'b1', name:'フォカッチャ',       price:240, cap:'ローズマリー香る',   color:'#c06f28', img:1 },
  { id:'b2', name:'ねじりパン',         price:200, cap:'バター折り込み',     color:'#d27d2c', img:2 },
  { id:'b3', name:'カンパーニュ',       price:320, cap:'天然酵母の田舎パン', color:'#9d7657', img:3 },
  { id:'b4', name:'ライ麦パン',         price:300, cap:'香ばしいライ麦',     color:'#a5836c', img:4 },
  { id:'b5', name:'ボリュームサンド',   price:480, cap:'具だくさん',         color:'#b06c39', img:5 },
  { id:'b6', name:'プレッツェル',       price:220, cap:'岩塩きいた',         color:'#b66b47', img:6 },
  { id:'b7', name:'バゲット',           price:300, cap:'パリッと香ばしい',   color:'#9a6e4f', img:7 },
  { id:'b8', name:'食パン',             price:240, cap:'ふんわり耳まで',     color:'#d37820', img:8 },
  { id:'b9', name:'ベーコンエピ',       price:280, cap:'ベーコンの塩気',     color:'#c47632', img:9 },
];
const POOL_BY_ID = Object.fromEntries(POOL.map(m=>[m.id,m]));
let MENU = [];   // 今回のゲームで使う5種（毎ゲーム ランダム抽選・固定）
// 画像プリロード（IMG=丸バッジ / HERO=パンのみ切り抜き）
const IMG = [], HERO = [];
for(let i=0;i<POOL.length;i++){
  const im=new Image(); im.src='assets/bread'+i+'.png'; IMG[i]=im;
  const hg=new Image(); hg.src='assets/hero'+i+'.png'; HERO[i]=hg;
}
const LOGO = new Image(); LOGO.src='logo.png';   // 店ロゴ（背景透過）
const STORE_NAME = 'this is ormary store';
function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=a[i]; a[i]=a[j]; a[j]=t; } return a; }
function pickRoster(){
  MENU = shuffle(POOL.slice()).slice(0,5);           // 毎ゲーム 10種から5種をランダム抽選（固定）
  POOL.forEach(m=>m.sig=false);
  MENU[(Math.random()*MENU.length)|0].sig = true;    // 5種のうち1つを看板商品に
  daily = MENU[(Math.random()*MENU.length)|0];        // おすすめも5種から
}

//==================== 難易度カーブ（config/difficultyCurve 相当） ====================
// 種類は5固定。難易度は「落下スピードを徐々に上げる」方式。
function difficulty(t){           // t: 経過秒
  const k = Math.min(t/180, 1);   // 来店/我慢などは3分でフルランプ
  return {
    spawnEvery: 0.80 - 0.34*k,    // パン落下間隔(秒) 0.80→0.46（ゆるめ）
    custEvery:  4.6  - 1.8*k,     // 来店間隔(秒)
    patience:   13.0 - 4.0*k,     // 客の我慢(秒)
    fallSpeed:  55 + 26*Math.min(t/30, 9), // 落下速度を主役に：30秒ごとに上昇（最大~4.5分で頭打ち）
  };
}

//==================== サウンド（WebAudio・焼き音/効果音） ====================
let actx=null;
function audio(){ if(!actx){ try{actx=new (window.AudioContext||window.webkitAudioContext)();}catch(e){} } return actx; }
function blip(freq, dur, type='sine', vol=0.18, slideTo){
  const a=audio(); if(!a) return;
  const o=a.createOscillator(), g=a.createGain();
  o.type=type; o.frequency.setValueAtTime(freq, a.currentTime);
  if(slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, a.currentTime+dur);
  g.gain.setValueAtTime(vol, a.currentTime);
  g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
  o.connect(g); g.connect(a.destination); o.start(); o.stop(a.currentTime+dur);
}
function sfxConnect(n){ blip(330+n*55, 0.08, 'triangle', 0.12); }
function sfxMatch(big){ blip(big?523:440,0.12,'triangle',0.2); setTimeout(()=>blip(big?784:660,0.14,'triangle',0.2),70); if(big) setTimeout(()=>blip(1046,0.18,'sine',0.18),150); }
function sfxBake(){ // 釜出しの「パリッ」＝ノイズバースト
  const a=audio(); if(!a) return;
  const b=a.createBuffer(1, a.sampleRate*0.18, a.sampleRate); const d=b.getChannelData(0);
  for(let i=0;i<d.length;i++){ d[i]=(Math.random()*2-1)*Math.pow(1-i/d.length,2); }
  const s=a.createBufferSource(); s.buffer=b; const g=a.createGain(); g.gain.value=0.25;
  const f=a.createBiquadFilter(); f.type='highpass'; f.frequency.value=1800;
  s.connect(f); f.connect(g); g.connect(a.destination); s.start();
}
function sfxBuy(){ blip(660,0.09,'sine',0.16); setTimeout(()=>blip(990,0.12,'sine',0.16),80); }
function sfxAngry(){ blip(200,0.18,'sawtooth',0.14,90); }
function sfxFever(){ [523,659,784,1046,1318].forEach((f,i)=>setTimeout(()=>blip(f,0.18,'triangle',0.2),i*70)); }
function sfxOver(){ [440,392,330,247].forEach((f,i)=>setTimeout(()=>blip(f,0.3,'sawtooth',0.16),i*160)); }

//==================== BGM（内蔵・WebAudioループ） ====================
// 温かいパン屋っぽいマリンバ＋やさしいベース。外部ファイル不要・オフライン可。
const PENT=[261.63,293.66,329.63,392.00,440.00,523.25,587.33,659.25]; // C D E G A C5 D5 E5
const MEL =[5,null,4,3, 4,null,5,7, 4,null,3,1, 3,4,2,null];          // 16ステップの旋律
const BASS=[130.81,98.00,110.00,87.31];                               // C3 G2 A2 F2 (I-V-vi-IV)
const STEP=0.26;                                                      // 1ステップ秒
let bgm={ on:true, started:false, gain:null, next:0, step:0 };
function applyBgmVol(){ const a=audio(); if(bgm.gain&&a) bgm.gain.gain.setValueAtTime(bgm.on?0.5:0.0, a.currentTime); }
function startBGM(){ const a=audio(); if(!a||bgm.started) return;
  bgm.gain=a.createGain(); bgm.gain.connect(a.destination); applyBgmVol();
  bgm.started=true; bgm.next=a.currentTime+0.15; bgm.step=0; }
function bgmNote(freq,t,dur,type,vol){ const a=audio(); if(!a||!bgm.gain) return;
  const o=a.createOscillator(), g=a.createGain(); o.type=type; o.frequency.value=freq;
  g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(vol,t+0.012);
  g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
  o.connect(g); g.connect(bgm.gain); o.start(t); o.stop(t+dur+0.03); }
function scheduleStep(step,t){ const s=step%16, m=MEL[s];
  if(m!=null) bgmNote(PENT[m], t, 0.34, 'triangle', 0.16);
  if(s%4===0) bgmNote(BASS[(s/4)|0], t, 0.70, 'sine', 0.13);
  if(m!=null && s%8===2) bgmNote(PENT[m]*2, t, 0.18, 'sine', 0.05); } // 軽い装飾
function updateBGM(){ const a=audio(); if(!a||!bgm.started) return;
  while(bgm.next < a.currentTime+0.25){ scheduleStep(bgm.step, bgm.next); bgm.next+=STEP; bgm.step++; } }
const MUTE={ x:W-28, y:40, r:15 };
function drawMuteButton(){ const {x,y}=MUTE; ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,.28)'; ctx.beginPath(); ctx.arc(0,0,15,0,7); ctx.fill();
  ctx.fillStyle='#ffe9c2';
  ctx.beginPath(); ctx.moveTo(-8,-3.5); ctx.lineTo(-3,-3.5); ctx.lineTo(2,-8); ctx.lineTo(2,8); ctx.lineTo(-3,3.5); ctx.lineTo(-8,3.5); ctx.closePath(); ctx.fill();
  if(bgm.on){ ctx.strokeStyle='#ffe9c2'; ctx.lineWidth=1.6;
    ctx.beginPath(); ctx.arc(3,0,4.5,-0.7,0.7); ctx.stroke();
    ctx.beginPath(); ctx.arc(3,0,8,-0.7,0.7); ctx.stroke();
  } else { ctx.strokeStyle='#ff8a78'; ctx.lineWidth=2;
    ctx.beginPath(); ctx.moveTo(5,-5); ctx.lineTo(12,5); ctx.moveTo(12,-5); ctx.lineTo(5,5); ctx.stroke(); }
  ctx.restore(); }

//==================== パン描画（手描き調・procedural） ====================
function withShadow(fn){ ctx.save(); ctx.shadowColor='rgba(60,30,10,.28)'; ctx.shadowBlur=8; ctx.shadowOffsetY=4; fn(); ctx.restore(); }
function rr(x,y,w,h,r){ ctx.beginPath(); ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r); ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath(); }

// 各種のローカル描画（中心0,0、半径1基準）。s=スケール（半径px）
function drawBreadShape(id, s, hero){
  ctx.lineJoin='round'; ctx.lineCap='round';
  const ow='#5a3618'; // アウトライン
  if(id==='shoku'){ // 食パン：山型の角食
    ctx.fillStyle='#f6d493'; rr(-s*0.92,-s*0.55,s*1.84,s*1.25,s*0.32); ctx.fill();
    ctx.strokeStyle=ow; ctx.lineWidth=s*0.09; ctx.stroke();
    // 焼き色トップ
    ctx.save(); ctx.clip();
    ctx.fillStyle='#e8a64d';
    ctx.beginPath(); ctx.moveTo(-s*0.95,-s*0.2);
    ctx.bezierCurveTo(-s*0.4,-s*0.75,-s*0.1,-s*0.75,s*0.05,-s*0.45);
    ctx.bezierCurveTo(s*0.2,-s*0.75,s*0.55,-s*0.75,s*0.95,-s*0.25);
    ctx.lineTo(s*0.95,-s*0.7); ctx.lineTo(-s*0.95,-s*0.7); ctx.closePath(); ctx.fill();
    ctx.restore();
    ctx.fillStyle='#fff4dd'; rr(-s*0.7,s*0.05,s*1.4,s*0.55,s*0.18); ctx.fill(); // ふんわり断面感
  } else if(id==='an'){ // あんぱん：丸＋ごま
    const g=ctx.createRadialGradient(-s*0.3,-s*0.3,s*0.1,0,0,s);
    g.addColorStop(0,'#b06a34'); g.addColorStop(1,'#8a4d22');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,s*0.92,0,7); ctx.fill();
    ctx.strokeStyle=ow; ctx.lineWidth=s*0.09; ctx.stroke();
    ctx.fillStyle='#5d3214'; ctx.beginPath(); ctx.arc(0,-s*0.05,s*0.14,0,7); ctx.fill(); // へそ
    ctx.fillStyle='#fff'; // ごま
    [[-.4,-.35],[.35,-.4],[-.45,.3],[.42,.25],[0,.45],[-.1,-.55]].forEach(p=>{
      ctx.save(); ctx.translate(p[0]*s,p[1]*s); ctx.rotate(p[0]);
      ctx.beginPath(); ctx.ellipse(0,0,s*0.075,s*0.045,0,0,7); ctx.fill(); ctx.restore();
    });
  } else if(id==='melon'){ // メロンパン：丸＋格子
    const g=ctx.createRadialGradient(-s*0.3,-s*0.3,s*0.1,0,0,s);
    g.addColorStop(0,'#e6f0b0'); g.addColorStop(1,'#c2d472');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(0,0,s*0.92,0,7); ctx.fill();
    ctx.strokeStyle=ow; ctx.lineWidth=s*0.09; ctx.stroke();
    ctx.save(); ctx.beginPath(); ctx.arc(0,0,s*0.9,0,7); ctx.clip();
    ctx.strokeStyle='rgba(120,140,50,.55)'; ctx.lineWidth=s*0.07;
    for(let i=-3;i<=3;i++){ ctx.beginPath(); ctx.moveTo(i*s*0.32-s,-s); ctx.lineTo(i*s*0.32+s,s); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(i*s*0.32-s,s); ctx.lineTo(i*s*0.32+s,-s); ctx.stroke(); }
    ctx.restore();
  } else if(id==='cro'){ // クロワッサン：三日月
    ctx.save();
    const g=ctx.createLinearGradient(-s,-s,s,s); g.addColorStop(0,'#f0c06a'); g.addColorStop(1,'#d18f3a');
    ctx.fillStyle=g; ctx.strokeStyle=ow; ctx.lineWidth=s*0.09;
    ctx.beginPath();
    ctx.moveTo(-s*0.85,s*0.35);
    ctx.bezierCurveTo(-s*0.5,-s*0.85, s*0.5,-s*0.85, s*0.85,s*0.35);
    ctx.bezierCurveTo(s*0.55,-s*0.05, -s*0.55,-s*0.05, -s*0.85,s*0.35);
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.strokeStyle='rgba(150,90,30,.5)'; ctx.lineWidth=s*0.06;
    for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*s*0.28,-s*0.55+Math.abs(i)*s*0.12); ctx.lineTo(i*s*0.32, s*0.18); ctx.stroke(); }
    ctx.restore();
  } else { // バゲット：俵型＋クープ
    ctx.save();
    const g=ctx.createLinearGradient(0,-s,0,s); g.addColorStop(0,'#e7b56a'); g.addColorStop(1,'#c98a3e');
    ctx.fillStyle=g; rr(-s*0.95,-s*0.62,s*1.9,s*1.24,s*0.6); ctx.fill();
    ctx.strokeStyle=ow; ctx.lineWidth=s*0.09; ctx.stroke();
    ctx.strokeStyle='rgba(90,54,24,.7)'; ctx.lineWidth=s*0.08;
    for(let i=-2;i<=2;i++){ ctx.beginPath(); ctx.moveTo(i*s*0.34-s*0.08,-s*0.28); ctx.lineTo(i*s*0.34+s*0.08,s*0.28); ctx.stroke(); }
    ctx.restore();
  }
}
function drawBread(id, x, y, r, hero, rot){
  const m=POOL_BY_ID[id]; const im=m?IMG[m.img]:null;
  ctx.save(); ctx.translate(x,y); if(rot) ctx.rotate(rot);
  if(im && im.complete && im.naturalWidth){
    if(hero){ ctx.shadowColor='rgba(60,30,10,.3)'; ctx.shadowBlur=8; ctx.shadowOffsetY=4; }
    ctx.drawImage(im, -r, -r, r*2, r*2);
  } else { // 画像未読込時のフォールバック＝色付き丸
    ctx.fillStyle=m?m.color:'#caa06a'; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
    ctx.strokeStyle='#5a3618'; ctx.lineWidth=Math.max(2,r*0.12); ctx.stroke();
  }
  ctx.restore();
}
// 断面（食欲トリガー）
function drawCross(id, x, y, r){
  ctx.save(); ctx.translate(x,y);
  ctx.fillStyle='#fff7e8'; ctx.beginPath(); ctx.arc(0,0,r,0,7); ctx.fill();
  ctx.strokeStyle='#caa46a'; ctx.lineWidth=r*0.12; ctx.stroke();
  if(id==='an'){ ctx.fillStyle='#5b2f12'; ctx.beginPath(); ctx.arc(0,r*0.05,r*0.6,0,7); ctx.fill(); }
  else if(id==='cro'){ ctx.strokeStyle='#e3b063'; ctx.lineWidth=r*0.1;
    for(let i=0;i<5;i++){ ctx.beginPath(); ctx.arc(0,0,r*(0.25+i*0.15),0.4,2.7); ctx.stroke(); } }
  else if(id==='melon'){ ctx.fillStyle='#fce8a0'; ctx.beginPath(); ctx.arc(0,0,r*0.7,0,7); ctx.fill(); }
  else { ctx.fillStyle='#f4e3c0'; ctx.beginPath(); ctx.arc(0,0,r*0.62,0,7); ctx.fill(); }
  ctx.restore();
}

//==================== ゲーム状態 ====================
let state='title';   // title | play | over
let breads=[];       // 落下/山積みのパン
let customers=[];    // 客レーン
let effects=[];      // 棚へ飛ぶパンなどの上レイヤー演出
let showDisp=null;   // 固定ショーケース窓に表示中の焼き上がり（コンボ中は最新に切替）
let bigShow=null;    // 中央に名前入りで大きく表示する焼き上がり
let feverShow=null;  // フィーバー演出（全種焼き上がり）
let chainCount=0, cascading=false, cascadeT=0;  // 自動連鎖
let particles=[];
let popups=[];
let shelf={};        // 在庫 {id:count}
let unlocked={};     // 図鑑解放
let firstShown={};   // 初回強調管理
let score=0, combo=0, comboTimer=0, frustration=0, elapsed=0;
let spawnT=0, custT=0, baselineOver=0;
let best=+(localStorage.getItem('br_best')||0);
let daily=null;      // 本日のおすすめ
let shakeT=0, feverFlash=0, hitstopT=0;
// ランキング（この端末のローカルTOP）。全国/常連ランキングは imapp 登録が必要。
let ranking=[];      // スコア降順の配列（上位10件）
let myRank=0;        // 今回ゲームの順位
const IMAPP_SIGNUP_URL='https://imapp.shop';   // ← 登録ページ確定後に差し替え可
let ctaRect=null;    // 結果画面「imappに登録」CTAのクリック領域
let homeCtaRect=null;// ホーム画面「imappに登録」CTAのクリック領域

function loadSave(){
  try{ unlocked=JSON.parse(localStorage.getItem('br_zukan')||'{}'); }catch(e){ unlocked={}; }
  try{ ranking=JSON.parse(localStorage.getItem('br_ranking')||'[]'); }catch(e){ ranking=[]; }
  bgm.on = (localStorage.getItem('br_bgm')||'1')!=='0'; // BGM ON/OFF を復元
  pickRoster(); // タイトル表示用に5種を抽選（ゲーム開始時に再抽選）
}
function save(){ localStorage.setItem('br_zukan', JSON.stringify(unlocked)); localStorage.setItem('br_best', best); }

function activeTypes(){ return MENU; }   // 現在出現中の全種（スコアで増える）

function resetGame(){
  pickRoster(); // 毎ゲーム、5種をランダムに入れ替え
  breads=[]; customers=[]; effects=[]; showDisp=null; bigShow=null; feverShow=null;
  chainCount=0; cascading=false; cascadeT=0; particles=[]; popups=[];
  shelf={}; firstShown={}; score=0; combo=0; comboTimer=0; frustration=0;
  elapsed=0; spawnT=0; custT=6.0; baselineOver=0; shakeT=0; feverFlash=0; hitstopT=0; // 最初の客は6秒後（準備時間）
  MENU.forEach(m=>shelf[m.id]=0);
  prefill(11); // 開始時にパンを敷き詰め、すぐ3連できる状態に
}
function prefill(n){
  const types=activeTypes();
  for(let i=0;i<n;i++){
    const id=types[(Math.random()*types.length)|0].id;
    breads.push({ id,
      x:FIELD.x+BR+Math.random()*(FIELD.w-2*BR),
      y:FIELD.bottom-BR-Math.random()*210, // 下半分にばらまく→物理で落ち着く
      vx:0, vy:0, rot:(Math.random()-0.5)*0.3, vr:0, r:BR, sel:false, falling:true });
  }
}

//==================== 落下・物理（軽量・統一円） ====================
function spawnBread(){
  const types=activeTypes();
  // 看板商品はやや高頻度
  let id;
  if(daily && Math.random()<0.16 && types.includes(daily)) id=daily.id;
  else if(Math.random()<0.18){ const sig=types.find(m=>m.sig); id=sig?sig.id:types[0].id; }
  else id=types[(Math.random()*types.length)|0].id;
  breads.push({ id, x:FIELD.x+BR+Math.random()*(FIELD.w-2*BR), y:FIELD.y-2,
    vx:(Math.random()-0.5)*20, vy:0, rot:(Math.random()-0.5)*0.3, vr:(Math.random()-0.5)*0.4, r:BR, sel:false, falling:true });
}
// 山が崩れたら（マッチ消去など）近辺を起こして再安定させる
function wakeAll(){ for(const b of breads) if(!b.removing){ b.asleep=false; b.rest=0; } }
function physics(dt){
  const g=900, df=difficulty(elapsed);
  for(const b of breads){
    if(b.removing || b.asleep) continue;   // 眠っているパンは動かさない＝山が静止
    b.vy+=g*dt; if(b.vy>df.fallSpeed*6) b.vy=df.fallSpeed*6;
    b.x+=b.vx*dt; b.y+=b.vy*dt; b.rot+=b.vr*dt; b.vr*=0.90;
    if(b.x<FIELD.x+BR){ b.x=FIELD.x+BR; b.vx=Math.abs(b.vx)*0.2; }
    if(b.x>FIELD.x+FIELD.w-BR){ b.x=FIELD.x+FIELD.w-BR; b.vx=-Math.abs(b.vx)*0.2; }
    if(b.y>FIELD.bottom-BR){ b.y=FIELD.bottom-BR; b.vy=0; b.vx*=0.7; b.falling=false; } // 床に着地（跳ねない）
    b.vx*=0.90;                            // 横滑りを抑える摩擦
  }
  // 衝突解決（数回反復）
  for(let it=0; it<4; it++){
    for(let i=0;i<breads.length;i++){ const a=breads[i]; if(a.removing) continue;
      for(let j=i+1;j<breads.length;j++){ const c=breads[j]; if(c.removing) continue;
        let dx=c.x-a.x, dy=c.y-a.y; let d=Math.hypot(dx,dy); const min=a.r+c.r;
        if(d<min && d>0.001){ const ov=(min-d)/2; dx/=d; dy/=d;
          a.x-=dx*ov; a.y-=dy*ov; c.x+=dx*ov; c.y+=dy*ov;
          const rv=(c.vx-a.vx)*dx+(c.vy-a.vy)*dy;          // 非弾性（跳ね返さない）
          if(rv<0){ a.vx+=dx*rv*0.5; a.vy+=dy*rv*0.5; c.vx-=dx*rv*0.5; c.vy-=dy*rv*0.5; }
          // 着地済みのパンに支えられたら、その上のパンも山の一部として確定
          if(!a.falling && c.falling) c.falling=false;
          if(!c.falling && a.falling) a.falling=false;
          // 動いている相手に触れた眠りパンだけ起こす（眠り同士は起こさない＝ジッター防止）
          if(a.asleep && !c.asleep){ a.asleep=false; a.rest=0; }
          if(c.asleep && !a.asleep){ c.asleep=false; c.rest=0; }
        } else if(d<=0.001){ a.x-=1; c.x+=1; }
      }}
  }
  // 端の押し戻し＋スリープ判定
  for(const b of breads){
    if(b.removing) continue;
    if(b.x<FIELD.x+BR) b.x=FIELD.x+BR;
    if(b.x>FIELD.x+FIELD.w-BR) b.x=FIELD.x+FIELD.w-BR;
    if(b.y>FIELD.bottom-BR) b.y=FIELD.bottom-BR;
    if(b.asleep) continue;
    if(Math.abs(b.vx)<3) b.vx=0;                           // 微小速度はゼロに
    // 着地済みでほぼ静止が続いたら眠らせる（モゾモゾ動きを停止）
    if(!b.falling && (b.vx*b.vx+b.vy*b.vy)<9){
      b.rest=(b.rest||0)+dt; if(b.rest>0.18){ b.asleep=true; b.vx=0; b.vy=0; b.vr=0; }
    } else b.rest=0;
  }
}

//==================== なぞりマッチ ====================
let chain=[];     // 選択中のパン配列
let dragging=false;
const CONNECT=BR*2.75;   // 隣接とみなす中心間距離
const GRAB=BR*1.35;      // 指の許容（中心から少し外れても拾う）

function toLogic(e){
  const r=canvas.getBoundingClientRect();
  const cx=(e.clientX-r.left)*(canvas.width/r.width);
  const cy=(e.clientY-r.top )*(canvas.height/r.height);
  return { x:(cx-offX)/fit, y:(cy-offY)/fit };
}
// ポインタに最も近いパン（rad以内）。filterで種類等を絞れる。
function nearestBread(p, rad, filter){
  let best=null, bd=rad;
  for(const b of breads){ if(b.removing) continue; if(filter && !filter(b)) continue;
    const d=Math.hypot(p.x-b.x,p.y-b.y); if(d<bd){ bd=d; best=b; } }
  return best;
}
function onDown(e){
  audio() && actx.resume && actx.resume();
  startBGM();
  const p=toLogic(e);
  // ミュートボタン（全画面共通・最優先）
  if(Math.hypot(p.x-MUTE.x, p.y-MUTE.y) < MUTE.r+8){
    bgm.on=!bgm.on; applyBgmVol(); localStorage.setItem('br_bgm', bgm.on?'1':'0'); return;
  }
  if(state==='title'){
    // ロゴを押す → 一回震える（離した時にInstagramへ）
    if(logoRect && p.x>=logoRect.x && p.x<=logoRect.x+logoRect.w && p.y>=logoRect.y && p.y<=logoRect.y+logoRect.h){
      logoPressing=true; logoShakeT=LOGO_SHAKE; return;
    }
    // imapp 登録 CTA（ホーム）
    if(homeCtaRect && p.x>=homeCtaRect.x && p.x<=homeCtaRect.x+homeCtaRect.w && p.y>=homeCtaRect.y && p.y<=homeCtaRect.y+homeCtaRect.h){
      try{ if(window.open) window.open(IMAPP_SIGNUP_URL,'_blank','noopener'); }catch(e){}
      return;
    }
    startGame(); return;
  }
  if(state==='over'){
    // imapp 登録 CTA を最優先で判定
    if(ctaRect && p.x>=ctaRect.x && p.x<=ctaRect.x+ctaRect.w && p.y>=ctaRect.y && p.y<=ctaRect.y+ctaRect.h){
      try{ if(window.open) window.open(IMAPP_SIGNUP_URL,'_blank','noopener'); }catch(e){}
      return;
    }
    // 「もう一度 焼く」ボタン → 即リスタート
    if(p.y>=694 && p.y<=754 && p.x>=W/2-130 && p.x<=W/2+130){ startGame(); return; }
    state='title'; return;   // それ以外はタイトルへ
  }
  const b=nearestBread(p, GRAB);
  if(b){ dragging=true; chain=[b]; b.sel=true; sfxConnect(0); }
}
function onMove(e){
  if(!dragging) return;
  const p=toLogic(e);
  const last=chain[chain.length-1];
  // バックトラック：直前のパン付近に戻ったら1つ取り消し
  if(chain.length>=2){
    const prev=chain[chain.length-2];
    if(Math.hypot(p.x-prev.x,p.y-prev.y) < prev.r){ const drop=chain.pop(); drop.sel=false; return; }
  }
  // 次の連結先：指に近く・同種・未選択・直前と隣接 のうち最も近いパン
  const cand=nearestBread(p, GRAB, b=>!b.sel && b.id===last.id && Math.hypot(b.x-last.x,b.y-last.y)<CONNECT);
  if(cand){ chain.push(cand); cand.sel=true; sfxConnect(chain.length); }
}
function onUp(){
  // ロゴを離した → Instagram へ（押下中に震えた後）
  if(logoPressing){ logoPressing=false; if(overLogo()){ try{ if(window.open) window.open(IG_URL,'_blank','noopener'); }catch(e){} } return; }
  if(!dragging) return; dragging=false;
  if(chain.length>=3) resolveMatch(chain);
  else chain.forEach(b=>b.sel=false);
  chain=[];
}

// 1グループを焼き上げる（手動マッチ・自動連鎖 共通）
function bakeGroup(arr, auto){
  const id=arr[0].id, n=arr.length, m=POOL_BY_ID[id], col=m.color;
  let cx=0,cy=0; arr.forEach(b=>{cx+=b.x;cy+=b.y;}); cx/=n; cy/=n;
  arr.forEach(b=>{ b.removing=true; spawnPuff(b.x,b.y,col); });
  const kama = n>=5;                // 大量同時消し＝釜出しボーナス
  spawnRing(cx,cy,col, kama?2:1); spawnBurst(cx,cy,col, 10+n*3);
  hitstopT=Math.max(hitstopT, kama?0.10:0.06); shakeT=Math.max(shakeT, kama?0.3:0.12);
  shelf[id]=(shelf[id]||0)+n+(kama?2:0);
  if(kama){ feverFlash=Math.max(feverFlash,0.3); sfxBake(); }
  // スコア
  comboTimer=2.2; combo++;
  const mult=1+Math.min(combo-1,9)*0.15, sig=m.sig, dailyBonus=(daily&&daily.id===id)?1.5:1;
  const pts=Math.round((n*40+(n-3)*30)*mult*(sig?1.6:1)*(kama?1.8:1)*dailyBonus*(auto?1.4:1));
  score+=pts;
  addPopup(cx,cy-20,'+'+pts, sig?'#ffd24a':'#fff', kama?34:26);
  if(combo>=3) addPopup(cx,cy-52,'COMBO x'+combo,'#ff9a3c',22);
  if(!unlocked[id]){ unlocked[id]=true; addPopup(W/2,BASELINE_Y+40,'★図鑑に追加：'+m.name,'#9fe',22); save(); }
  // 名前入りでパンを大きく表示（やきたて！）＋棚へ飛ばす
  firstShown[id]=true; const big=sig||kama;
  bigShow={ id, n, name:m.name, sig, kama, t:0, dur:1.1 };
  effects.push(makeFly(id, big));
  sfxMatch(sig||kama);
}
// 手動マッチ → 焼き上げて連鎖チェック開始
function resolveMatch(arr){
  chainCount=0;
  bakeGroup(arr.slice(), false);
  setTimeout(()=>{ breads=breads.filter(b=>!b.removing); wakeAll(); cascading=true; cascadeT=0.55; }, 10);
}
// 着地済みの同種隣接グループ(3個以上)を全部探す
function findGroups(){
  const list=breads.filter(b=>!b.removing && !b.falling);
  const seen=new Set(), groups=[];
  for(const b of list){ if(seen.has(b)) continue;
    const comp=[b]; seen.add(b); let qi=0;
    while(qi<comp.length){ const c=comp[qi++];
      for(const o of list){ if(seen.has(o)||o.id!==b.id) continue;
        if(Math.hypot(o.x-c.x,o.y-c.y)<CONNECT){ seen.add(o); comp.push(o); } } }
    if(comp.length>=3) groups.push(comp);
  }
  return groups;
}
// 連鎖1ステップ（自動消去）
function cascadeStep(){
  const groups=findGroups();
  if(!groups.length){ cascading=false; chainCount=0; return; }
  chainCount++;
  addPopup(W/2, BASELINE_Y+10, chainCount+' 連鎖!', '#ff7b3c', 26);
  for(const g of groups) bakeGroup(g, true);
  breads=breads.filter(b=>!b.removing); wakeAll();
  if(chainCount>=3){ triggerFever(); cascading=false; chainCount=0; return; }
  cascadeT=0.5;              // 次の連鎖チェック（落ち着くのを待つ）
}
// 3連鎖以上 → 全種フィーバー
function triggerFever(){
  feverFlash=1.0; shakeT=0.6; sfxFever(); sfxBake();
  let bonus=0;
  for(const m of MENU){ shelf[m.id]=(shelf[m.id]||0)+3; bonus+=300; }
  score+=bonus+800;
  addPopup(W/2, BASELINE_Y+95, 'FEVER!! +'+(bonus+800), '#ffd24a', 32);
  feverShow={ t:0, dur:2.0 };
  // 場の着地パンを一掃＝全種焼き上がり
  breads.forEach(b=>{ if(!b.falling && !b.removing){ b.removing=true; spawnBurst(b.x,b.y,POOL_BY_ID[b.id].color,4); } });
  breads=breads.filter(b=>!b.removing); wakeAll();
}

//==================== ショーケース（固定窓表示＋棚へ飛ぶ） ====================
function easeBack(t){ const c1=2.2, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); } // オーバーシュート
function shelfSlot(id){
  const idx=MENU.findIndex(m=>m.id===id);
  const cw=FIELD.w/MENU.length;
  return { x:FIELD.x+cw*idx+cw/2, y:SHELF.y+SHELF.h*0.42 };
}
function winHero(){ return { x:W/2, y:FIELD.y+150 }; }   // 「やきたて！」表示の中心＝棚へ飛ぶ起点
// 焼けたパンが窓から棚へ弧を描いて飛ぶ（在庫はマッチ時に加算済み・これは演出）
function makeFly(id,big){ return { id, big, t:0, dur:0.6, landed:false }; }
function updateFly(fx,dt){ fx.t+=dt; if(fx.t>=fx.dur){
  if(!fx.landed){ fx.landed=true; const s=shelfSlot(fx.id); spawnSpark(s.x,s.y,POOL_BY_ID[fx.id].color); }
  return true; } return false; }
function drawFly(fx){
  const w=winHero(), s=shelfSlot(fx.id), q=fx.t/fx.dur, ee=q*q;
  const x=w.x+(s.x-w.x)*q, y=w.y+(s.y-w.y)*ee - Math.sin(q*Math.PI)*70;
  const r=(fx.big?26:22)*(1-0.42*q);
  ctx.save(); ctx.globalAlpha=0.95; drawBread(fx.id,x,y,r,true,q*1.6); ctx.restore();
}
// パンのみ（バッジ無し）を大きく描く
function drawHeroBread(id,x,y,half,rot){
  const m=POOL_BY_ID[id], im=m?HERO[m.img]:null;
  if(!(im && im.complete && im.naturalWidth)){ drawBread(id,x,y,half,true,rot); return; }
  const s=(half*2)/Math.max(im.naturalWidth,im.naturalHeight), w=im.naturalWidth*s, h=im.naturalHeight*s;
  ctx.save(); ctx.translate(x,y); if(rot) ctx.rotate(rot);
  ctx.shadowColor='rgba(40,20,5,.35)'; ctx.shadowBlur=14; ctx.shadowOffsetY=6;
  ctx.drawImage(im, -w/2, -h/2, w, h); ctx.restore();
}
// 名前入りで大きく表示（3連クリア時の主役演出・中央上）＝パンだけドンと出す
function drawBigShow(){
  if(!bigShow) return;
  const d=bigShow, p=d.t/d.dur, m=POOL_BY_ID[d.id];
  const e=Math.min(p/0.2,1), sc=(e<1?easeBack(e):1), fade=p>0.78?Math.max(0,1-(p-0.78)/0.22):1;
  const cx=W/2, cy=FIELD.y+185, half=150*sc;   // 上へ・もっと大きく
  ctx.save(); ctx.globalAlpha=fade; ctx.textAlign='center';
  drawGlow(cx,cy, half*1.75, d.sig?'rgba(255,210,90,.48)':'rgba(255,245,220,.42)');
  if(d.kama){ ctx.fillStyle='#e8552e'; ctx.font=`900 ${30*sc}px 'Kosugi Maru'`; ctx.fillText('釜出し‼', cx, cy-half-20); }
  drawHeroBread(d.id, cx, cy, half, 0);
  ctx.font=`900 34px 'Kosugi Maru'`; ctx.lineWidth=7; ctx.strokeStyle='rgba(90,50,20,.65)'; ctx.fillStyle='#fff';
  const label=m.name+'  ×'+d.n;
  ctx.strokeText(label, cx, cy+half+40); ctx.fillText(label, cx, cy+half+40);
  ctx.restore();
}
// 全種フィーバー演出
function drawFeverShow(){
  if(!feverShow) return;
  const p=feverShow.t/feverShow.dur, fade=p>0.85?Math.max(0,1-(p-0.85)/0.15):Math.min(p/0.12,1);
  const cy=FIELD.y+160;
  ctx.save(); ctx.globalAlpha=fade; ctx.textAlign='center';
  ctx.fillStyle='rgba(255,180,40,.22)'; ctx.fillRect(0,FIELD.y,W,FIELD.bottom-FIELD.y);
  ctx.fillStyle='#fff'; ctx.font=`900 58px 'Kosugi Maru'`; ctx.strokeStyle='#e8552e'; ctx.lineWidth=9;
  ctx.strokeText('FEVER!!', W/2, cy-96); ctx.fillText('FEVER!!', W/2, cy-96);
  const gap=W/(MENU.length+1);
  MENU.forEach((m,i)=>{ const x=gap*(i+1), bob=Math.sin(feverShow.t*8+i)*7; drawBread(m.id, x, cy+bob, 40, true); });
  ctx.fillStyle='#ffe9c2'; ctx.font=`bold 18px 'Kosugi Maru'`; ctx.fillText('全種 焼き上がり！', W/2, cy+86);
  ctx.restore();
}
//==================== 客（CustomerSystem） ====================
function spawnCustomer(){
  if(customers.length>=4) return;
  const types=activeTypes();
  let want;
  if(daily && Math.random()<0.22 && types.includes(daily)) want=daily.id;
  else if(Math.random()<0.25){ const sig=types.find(m=>m.sig); want= sig?sig.id:types[0].id; }
  else want=types[(Math.random()*types.length)|0].id;
  const df=difficulty(elapsed);
  customers.push({ want, patience:df.patience, maxP:df.patience, t:0,
    face:'normal', buyT:0, leaving:0, tx:0, mood:0, hue:(Math.random()*60-30)|0 });
}
function updateCustomers(dt){
  const slotW=FIELD.w/4;
  customers.forEach((c,i)=>{ c.tx = FIELD.x+slotW*i+slotW/2; });
  for(let i=customers.length-1;i>=0;i--){
    const c=customers[i]; c.t+=dt;
    if(c.leaving>0){ c.leaving-=dt; if(c.leaving<=0) customers.splice(i,1); continue; }
    const front = i===0;
    if(front){
      if(c.buyT>0){ c.buyT-=dt; if(c.buyT<=0){ buy(c); } continue; }
      if((shelf[c.want]||0)>0){ c.buyT=0.45; c.face='happy'; }
      else { c.patience-=dt; c.face = c.patience<c.maxP*0.3?'angry':'wait';
        // 来店直後 約2.5秒は猶予（その間は不満が溜まらない）
        if(c.patience < c.maxP-2.5) frustration += dt*(2.0 + elapsed*0.012);
        if(c.patience<=0){ c.face='angry'; c.leaving=0.6; c.mood=-1; frustration+=4; sfxAngry();
          addPopup(c.tx, ORDERS.y+ORDERS.h+8,'(>_<)','#ff6b6b',22); }
      }
    } else {
      // 後方は軽く待つ
      if((shelf[c.want]||0)>0) c.face='hope'; else c.face='normal';
    }
  }
  if(frustration>100) frustration=100;
}
function buy(c){
  shelf[c.want]=Math.max(0,(shelf[c.want]||0)-1);
  const m=POOL_BY_ID[c.want];
  const pts=Math.round(m.price*0.5*(m.sig?1.4:1)*(daily&&daily.id===c.want?1.5:1));
  score+=pts; c.face='happy'; c.leaving=0.5; c.mood=1; c.buyT=-1;
  addPopup(c.tx, ORDERS.y+ORDERS.h+8, '¥'+pts, '#7ed957', 22);
  spawnSpark(c.tx, ORDERS.y+ORDERS.h*0.5, '#ffd24a');
  frustration=Math.max(0, frustration-7); // 満足退店でしっかり回復
  sfxBuy();
}

//==================== パーティクル / ポップアップ ====================
function spawnPuff(x,y,col){ for(let i=0;i<6;i++) particles.push({x,y,vx:(Math.random()-0.5)*120,vy:-Math.random()*120,life:0.5,max:0.5,col,r:6+Math.random()*5,g:400}); }
function spawnSpark(x,y,col){ for(let i=0;i<10;i++){ const a=Math.random()*7; particles.push({x,y,vx:Math.cos(a)*140,vy:Math.sin(a)*140-40,life:0.6,max:0.6,col,r:3,g:200,star:true}); } }
function spawnSteam(x,y){ particles.push({x,y,vx:(Math.random()-0.5)*16,vy:-40-Math.random()*30,life:0.9,max:0.9,col:'rgba(255,255,255,.5)',r:7,g:-30,steam:true}); }
// 焼き上がりの衝撃波リング
function spawnRing(x,y,col,big){ particles.push({x,y,vx:0,vy:0,g:0,life:0.45,max:0.45,col,ring:true,r:BR*0.6,rmax:BR*(big?5.5:3.6),lw:big?9:6}); }
// 同色のパンくず飛散
function spawnBurst(x,y,col,n){ for(let i=0;i<n;i++){ const a=Math.random()*7, sp=120+Math.random()*220;
  particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-120,life:0.55+Math.random()*0.35,max:0.9,col,r:3+Math.random()*4,g:520,crumb:true}); } }
function updateParticles(dt){
  for(let i=particles.length-1;i>=0;i--){ const p=particles[i]; p.life-=dt;
    if(p.ring){ p.r += (p.rmax-p.r)*Math.min(1,dt*10); }
    else { p.vy+=(p.g||300)*dt; p.x+=p.vx*dt; p.y+=p.vy*dt; if(p.steam) p.r+=12*dt; if(p.crumb) p.vx*=0.96; }
    if(p.life<=0) particles.splice(i,1); }
  for(let i=popups.length-1;i>=0;i--){ const u=popups[i]; u.t+=dt; u.y-=24*dt; if(u.t>u.dur) popups.splice(i,1); }
}

function checkGameOver(dt){
  // A: 山が基準線を一定時間超過（落下中のパンは数えず、着地した山だけで判定）
  let top=FIELD.bottom;
  for(const b of breads){
    if(b.removing || b.falling) continue;  // 着地済みのパンだけが"山"
    top=Math.min(top, b.y-b.r);
  }
  if(top<BASELINE_Y){ baselineOver+=dt; } else baselineOver=Math.max(0,baselineOver-dt*2.0);
  if(baselineOver>2.5) return gameOver('棚が山積みに…！');
  // B: 不満MAX
  if(frustration>=100) return gameOver('お客さんの不満が爆発！');
}
function gameOver(reason){
  if(state!=='play') return;
  state='over'; overReason=reason; sfxOver();
  if(score>best){ best=score; }
  // ローカルランキング更新（上位10件）＋今回順位
  ranking.push(score); ranking.sort((a,b)=>b-a); ranking=ranking.slice(0,10);
  myRank = ranking.indexOf(score)+1; // 同点は上位側
  localStorage.setItem('br_ranking', JSON.stringify(ranking));
  save();
  // imapp へスコア送信（packer-panic と同契約）。埋め込み時のみ届く
  IMAPP.gameOver(score, { survivalSec: Math.round(elapsed), types: MENU.length,
    zukan: POOL.filter(m=>unlocked[m.id]).length, reason });
}

  ctx.lineWidth= baselineOver>0?3:2; ctx.beginPath(); ctx.moveTo(FIELD.x,BASELINE_Y); ctx.lineTo(FIELD.x+FIELD.w,BASELINE_Y); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = baselineOver>0?'#ff5b5b':'rgba(180,100,50,.6)'; ctx.font=`bold 11px 'Kosugi Maru'`; ctx.textAlign='left';
  ctx.fillText('▲ ここを越えると満杯', FIELD.x+4, BASELINE_Y-5);

  for(const b of breads){
    if(b.sel){ drawGlow(b.x,b.y,b.r*1.5,'rgba(255,220,120,.6)'); }
    if(POOL_BY_ID[b.id].sig){ ctx.save(); ctx.strokeStyle='#ffba2e'; ctx.lineWidth=3.5;
      ctx.beginPath(); ctx.arc(b.x,b.y,b.r+2,0,7); ctx.stroke(); ctx.restore(); }
    drawBread(b.id, b.x, b.y, b.r, false, b.rot);
  }
  // なぞり線
  if(chain.length){ ctx.save(); ctx.strokeStyle='rgba(255,180,70,.85)'; ctx.lineWidth=10; ctx.lineCap='round'; ctx.lineJoin='round';
    ctx.beginPath(); chain.forEach((b,i)=> i?ctx.lineTo(b.x,b.y):ctx.moveTo(b.x,b.y)); ctx.stroke();
    ctx.fillStyle='#fff'; ctx.font=`900 22px 'Kosugi Maru'`; ctx.textAlign='center';

}

function drawGlow(x,y,r,col){ ctx.save(); const g=ctx.createRadialGradient(x,y,0,x,y,r); g.addColorStop(0,col); g.addColorStop(1,'rgba(255,255,255,0)'); ctx.fillStyle=g; ctx.beginPath(); ctx.arc(x,y,r,0,7); ctx.fill(); ctx.restore(); }
function drawParticles(){
  particles.forEach(p=>{ ctx.save(); ctx.globalAlpha=Math.max(0,p.life/p.max);
    if(p.ring){ ctx.strokeStyle=p.col; ctx.lineWidth=p.lw*Math.max(0.2,p.life/p.max);
      ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.stroke();
      ctx.globalAlpha*=0.4; ctx.lineWidth=p.lw*0.4; ctx.strokeStyle='#fff'; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.stroke(); }
    else if(p.steam){ ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
    else if(p.star){ ctx.fillStyle=p.col; star(p.x,p.y,p.r*1.8,5); }
    else { ctx.fillStyle=p.col; ctx.beginPath(); ctx.arc(p.x,p.y,p.r,0,7); ctx.fill(); }
    ctx.restore(); });
  popups.forEach(u=>{ ctx.save(); ctx.globalAlpha=Math.max(0,1-u.t/u.dur);
    ctx.fillStyle=u.col; ctx.font=`900 ${u.size}px 'Kosugi Maru'`; ctx.textAlign='center';
    ctx.strokeStyle='rgba(90,50,20,.6)'; ctx.lineWidth=4; ctx.strokeText(u.text,u.x,u.y); ctx.fillText(u.text,u.x,u.y); ctx.restore(); });
}
function star(x,y,r,n){ ctx.beginPath(); for(let i=0;i<n*2;i++){ const a=Math.PI*i/n - Math.PI/2; const rr2=i%2?r*0.45:r; ctx.lineTo(x+Math.cos(a)*rr2,y+Math.sin(a)*rr2);} ctx.closePath(); ctx.fill(); }

  const cnt=POOL.filter(m=>unlocked[m.id]).length;

  ctx.fillText('メニュー図鑑  '+cnt+' / '+POOL.length+' 種 解放', W/2, 470);
  const cw=W/5;
  POOL.forEach((m,i)=>{ const x=cw*(i%5)+cw/2, y= i<5?512:566;
    ctx.globalAlpha=unlocked[m.id]?1:0.22; drawBread(m.id,x,y,20,true); ctx.globalAlpha=1;
    if(!unlocked[m.id]){ ctx.fillStyle='#caa'; ctx.font=`18px 'Kosugi Maru'`; ctx.fillText('?',x,y+6); }
  });
  // ローカルランキング（この端末）
  ctx.fillStyle='#ffe9c2'; ctx.font=`bold 15px 'Kosugi Maru'`;
  ctx.fillText('🏆 ローカル順位  '+(myRank>0?myRank+' 位':'-')+'  / '+ranking.length+' 件', W/2, 602);
  // imapp 登録 CTA（全国・常連ランキングは imapp アカウントが必要）
  const cw2=320, chx=W/2-cw2/2, chy=616, chh=50;
  ctaRect={x:chx,y:chy,w:cw2,h:chh};
  ctx.save();
  ctx.fillStyle='#2575e6'; rr(chx,chy,cw2,chh,12); ctx.fill();
  ctx.strokeStyle='#bcd6ff'; ctx.lineWidth=1.5; rr(chx+4,chy+4,cw2-8,chh-8,9); ctx.stroke();
  ctx.fillStyle='#fff'; ctx.font=`900 16px 'Kosugi Maru'`; ctx.fillText('全国ランキングに参加  imapp登録 ▶', W/2, chy+24);
  ctx.fillStyle='#d6e6ff'; ctx.font=`10px 'Kosugi Maru'`; ctx.fillText('常連順位・全国順位は imapp アカウントで記録', W/2, chy+41);
  ctx.restore();
  // ボタン
  ctx.fillStyle='#ff8c2e'; rr(W/2-130,694,260,60,30); ctx.fill();
  ctx.fillStyle='#fff'; ctx.font=`900 23px 'Kosugi Maru'`; ctx.fillText('もう一度 焼く', W/2, 731);
  ctx.fillStyle='#d8b98a'; ctx.font=`13px 'Kosugi Maru'`; ctx.fillText('画面下をタップでタイトルへ', W/2, 800);
}

//==================== メインループ ====================
function startGame(){ resetGame(); state='play'; IMAPP.gameStart(); }
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000||0, 0.05); last=ts;
  // 更新
  if(state==='play'){
    const frozen = hitstopT>0;   // 焼き上がり打感：ごく短く本体を止める（演出は動かす）
    if(hitstopT>0) hitstopT-=dt;
    if(!frozen){
      elapsed+=dt;
      const df=difficulty(elapsed);
      spawnT-=dt; if(spawnT<=0){ spawnBread(); spawnT=df.spawnEvery; }
      custT-=dt; if(custT<=0){ spawnCustomer(); custT=df.custEvery; }
      physics(dt);
      updateCustomers(dt);
      comboTimer-=dt; if(comboTimer<=0) combo=0;
      if(cascading){ cascadeT-=dt; if(cascadeT<=0) cascadeStep(); } // 自動連鎖チェック
      checkGameOver(dt);
    }
    // 演出・パーティクルはヒットストップ中も動かす（テンポを殺さない）
    for(let i=effects.length-1;i>=0;i--){ if(updateFly(effects[i],dt)) effects.splice(i,1); }
    if(bigShow){ bigShow.t+=dt; if(bigShow.t>bigShow.dur) bigShow=null; }
    if(feverShow){ feverShow.t+=dt; if(feverShow.t>feverShow.dur) feverShow=null; }
    updateParticles(dt);
    if(feverFlash>0) feverFlash-=dt;
    if(shakeT>0) shakeT-=dt;
  } else { titleT+=dt; updateParticles(dt);
    // ロゴ：マウスで「合わせた瞬間」に一回だけ震える
    const over = pointer.type!=='touch' && overLogo();
    if(over && !wasOverLogo) logoShakeT=LOGO_SHAKE;
    wasOverLogo=over;
    if(logoShakeT>0) logoShakeT-=dt;
  }
  updateBGM(); // BGMスケジューラ（全状態で進める）

  // 描画
  ctx.setTransform(1,0,0,1,0,0);
  ctx.fillStyle='#1c1209'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.setTransform(fit,0,0,fit,offX,offY);
  // シェイク
  if(shakeT>0){ ctx.translate((Math.random()-0.5)*8, (Math.random()-0.5)*8); }

  if(state==='title'){ drawTitle(); }
  else {
    clearBG();
    drawField();
    drawShelf();
    drawHUD();              // 上部バー＋クリーム帯（フィールド上端を隠す）
    drawOrders();           // オーダー票（バンド内）
    effects.forEach(drawFly); // 窓→棚へ飛ぶパン（フィールド上に表示）
    if(feverFlash>0){ ctx.fillStyle=`rgba(255,210,90,${feverFlash*0.45})`; ctx.fillRect(0,FIELD.y,W,H-FIELD.y); }
    drawParticles();        // マッチ点の衝撃波・パンくず・ポップアップ
    drawBigShow();          // 名前入りで大きく表示
    drawFeverShow();        // 全種フィーバー演出
    if(state==='over') drawOver();
  }
  drawMuteButton(); // ミュート切替（全画面共通・最前面）
  requestAnimationFrame(loop);
}

//==================== 入力結線 ====================
function trackPointer(e){ const p=toLogic(e); pointer.x=p.x; pointer.y=p.y; pointer.type=e.pointerType||'mouse'; }
canvas.addEventListener('pointerdown', e=>{ e.preventDefault(); trackPointer(e); onDown(e); });
canvas.addEventListener('pointermove', e=>{ e.preventDefault(); trackPointer(e); onMove(e); });
window.addEventListener('pointerup', e=>{ if(pointer.type==='touch'){ pointer.x=-999; pointer.y=-999; } onUp(e); });
canvas.addEventListener('pointercancel', e=>{ logoPressing=false; pointer.x=-999; pointer.y=-999; onUp(e); });
canvas.addEventListener('pointerleave', ()=>{ pointer.x=-999; pointer.y=-999; }); // マウスがロゴから外れたらホバー解除
canvas.addEventListener('contextmenu', e=>e.preventDefault());

//==================== 起動 ====================
loadSave(); resize();
// フォント読み込み後に再描画
if(document.fonts && document.fonts.ready) document.fonts.ready.then(()=>{});
requestAnimationFrame(loop);
IMAPP.ready(); // imapp(親)へ「読込完了」を通知（埋め込み時のみ）

// PWA: http(s)配信時のみ Service Worker 登録（file:// 直開きでは何もしない）
if(typeof navigator!=='undefined' && 'serviceWorker' in navigator && location.protocol.startsWith('http')){
  window.addEventListener('load', ()=>{ navigator.serviceWorker.register('sw.js').catch(()=>{}); });
}
</script>
